<?xml version="1.0" encoding="UTF-8"?>
<!--
  Library backdrop — modern white bookshelf with colorful books,
  mixed orientations (upright + horizontal stacks), plants, and
  small decorative objects (ceramic coin bank, coin stack). Each
  book spine uses a vertical gradient (dark-light-dark) so it
  reads as rounded and lit from the front rather than as a flat
  rectangle. A few books are slightly tilted to break perfect
  alignment. Tile is 480×720, repeats horizontally.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="480" height="720" viewBox="0 0 480 720">
  <defs>
    <!-- Book spine gradients. Each runs darker-edge → lighter-mid
         → darker-edge horizontally, so every spine catches light
         in the middle and falls into shadow at its bound edges. -->
    <linearGradient id="b-red" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5a1410"/>
      <stop offset="0.5" stop-color="#b53929"/>
      <stop offset="1" stop-color="#5a1410"/>
    </linearGradient>
    <linearGradient id="b-burgundy" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2a0a0a"/>
      <stop offset="0.5" stop-color="#6b2424"/>
      <stop offset="1" stop-color="#2a0a0a"/>
    </linearGradient>
    <linearGradient id="b-navy" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0e1828"/>
      <stop offset="0.5" stop-color="#2c3e60"/>
      <stop offset="1" stop-color="#0e1828"/>
    </linearGradient>
    <linearGradient id="b-teal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0e2a2a"/>
      <stop offset="0.5" stop-color="#2d6b6b"/>
      <stop offset="1" stop-color="#0e2a2a"/>
    </linearGradient>
    <linearGradient id="b-forest" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#142418"/>
      <stop offset="0.5" stop-color="#3a5a40"/>
      <stop offset="1" stop-color="#142418"/>
    </linearGradient>
    <linearGradient id="b-sage" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3a4830"/>
      <stop offset="0.5" stop-color="#7a8a6c"/>
      <stop offset="1" stop-color="#3a4830"/>
    </linearGradient>
    <linearGradient id="b-mustard" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6a4f10"/>
      <stop offset="0.5" stop-color="#d4a437"/>
      <stop offset="1" stop-color="#6a4f10"/>
    </linearGradient>
    <linearGradient id="b-beige" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#94845c"/>
      <stop offset="0.5" stop-color="#d4c5a8"/>
      <stop offset="1" stop-color="#94845c"/>
    </linearGradient>
    <linearGradient id="b-cream" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#b0a489"/>
      <stop offset="0.5" stop-color="#ede5d2"/>
      <stop offset="1" stop-color="#b0a489"/>
    </linearGradient>
    <linearGradient id="b-black" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#000000"/>
      <stop offset="0.5" stop-color="#262626"/>
      <stop offset="1" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="b-brown" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3e2515"/>
      <stop offset="0.5" stop-color="#8b5a3c"/>
      <stop offset="1" stop-color="#3e2515"/>
    </linearGradient>
    <linearGradient id="b-plum" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2a1020"/>
      <stop offset="0.5" stop-color="#5a2848"/>
      <stop offset="1" stop-color="#2a1020"/>
    </linearGradient>
    <linearGradient id="b-olive" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#262410"/>
      <stop offset="0.5" stop-color="#6a6028"/>
      <stop offset="1" stop-color="#262410"/>
    </linearGradient>
    <linearGradient id="b-rust" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#321810"/>
      <stop offset="0.5" stop-color="#8a3a20"/>
      <stop offset="1" stop-color="#321810"/>
    </linearGradient>
    <linearGradient id="b-charcoal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1a1a1a"/>
      <stop offset="0.5" stop-color="#3a3a3a"/>
      <stop offset="1" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="b-white" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#c8c2b6"/>
      <stop offset="0.5" stop-color="#f0eee8"/>
      <stop offset="1" stop-color="#c8c2b6"/>
    </linearGradient>

    <!-- Glass case columns: lighter at the lit edge, slightly grey
         on the far edge. -->
    <linearGradient id="columnGlass" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#fdfbf6"/>
      <stop offset="0.5" stop-color="#ece8de"/>
      <stop offset="1" stop-color="#d8d2c4"/>
    </linearGradient>
    <linearGradient id="shelfGlass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fdfbf6"/>
      <stop offset="0.45" stop-color="#f3efe6"/>
      <stop offset="1" stop-color="#e2dcd0"/>
    </linearGradient>
    <linearGradient id="shelfDropShadow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000" stop-opacity="0.40"/>
      <stop offset="0.45" stop-color="#000" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#000" stop-opacity="0"/>
    </linearGradient>

    <!-- Vase + pot gradients for the decorative objects -->
    <linearGradient id="vasePot" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a89878"/>
      <stop offset="0.5" stop-color="#cfc2a8"/>
      <stop offset="1" stop-color="#9c8b6a"/>
    </linearGradient>
    <linearGradient id="leafA" x1="0" y1="0" x2="1" y2="0.5">
      <stop offset="0" stop-color="#3a5a30"/>
      <stop offset="0.5" stop-color="#5a7848"/>
      <stop offset="1" stop-color="#2a4828"/>
    </linearGradient>
    <linearGradient id="leafB" x1="0" y1="0" x2="1" y2="0.5">
      <stop offset="0" stop-color="#456840"/>
      <stop offset="0.5" stop-color="#6b8a58"/>
      <stop offset="1" stop-color="#345430"/>
    </linearGradient>
    <linearGradient id="terracotta" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5a3a18"/>
      <stop offset="0.5" stop-color="#8b6b3c"/>
      <stop offset="1" stop-color="#4a2e14"/>
    </linearGradient>

    <!-- subtle column-edge curvature shading overlay -->
    <linearGradient id="spineL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#000" stop-opacity="0.10"/>
      <stop offset="0.5" stop-color="#000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000" stop-opacity="0.10"/>
    </linearGradient>
  </defs>

  <!-- back wall (warm off-white) -->
  <rect width="480" height="720" fill="#ece6dc"/>

  <!-- vertical case columns rendered as glass with a specular
       highlight on the inside edge -->
  <rect x="0"   y="0" width="6" height="720" fill="url(#columnGlass)"/>
  <rect x="0"   y="0" width="1" height="720" fill="#ffffff" opacity="0.7"/>
  <rect x="158" y="0" width="6" height="720" fill="url(#columnGlass)"/>
  <rect x="158" y="0" width="1" height="720" fill="#ffffff" opacity="0.6"/>
  <rect x="316" y="0" width="6" height="720" fill="url(#columnGlass)"/>
  <rect x="316" y="0" width="1" height="720" fill="#ffffff" opacity="0.6"/>
  <rect x="474" y="0" width="6" height="720" fill="url(#columnGlass)"/>
  <rect x="474" y="0" width="1" height="720" fill="#ffffff" opacity="0.7"/>

  <!-- ============ ROW 1 — top shelf ============ -->
  <g>
    <!-- Section A -->
    <rect x="10"  y="32"  width="18" height="208" fill="url(#b-red)"/>
    <rect x="14"  y="92"  width="10" height="1.5" fill="#d4a437" opacity="0.7"/>
    <rect x="14"  y="100" width="10" height="1"   fill="#d4a437" opacity="0.5"/>
    <rect x="28"  y="46"  width="14" height="194" fill="url(#b-navy)"/>
    <g transform="rotate(-2 53 130)">
      <rect x="42"  y="22"  width="22" height="218" fill="url(#b-forest)"/>
      <rect x="48"  y="120" width="10" height="2"   fill="#c89c40" opacity="0.55"/>
    </g>
    <rect x="64"  y="52"  width="16" height="188" fill="url(#b-mustard)"/>
    <rect x="80"  y="28"  width="20" height="212" fill="url(#b-cream)"/>
    <rect x="85"  y="118" width="10" height="1.5" fill="#8b5a3c" opacity="0.7"/>
    <rect x="100" y="58"  width="14" height="182" fill="url(#b-burgundy)"/>
    <rect x="114" y="40"  width="18" height="200" fill="url(#b-teal)"/>
    <rect x="118" y="115" width="10" height="2"   fill="#d4a437" opacity="0.6"/>
    <rect x="132" y="24"  width="22" height="216" fill="url(#b-charcoal)"/>
    <rect x="138" y="118" width="10" height="2"   fill="#d4a437" opacity="0.7"/>
    <rect x="138" y="128" width="10" height="1"   fill="#d4a437" opacity="0.5"/>
    <!-- horizontal stack -->
    <rect x="14"  y="208" width="64" height="14" fill="url(#b-beige)"/>
    <rect x="14"  y="222" width="64" height="12" fill="url(#b-brown)"/>

    <!-- Section B -->
    <rect x="168" y="36"  width="20" height="204" fill="url(#b-navy)"/>
    <rect x="172" y="120" width="12" height="2"   fill="#d4a437" opacity="0.6"/>
    <rect x="188" y="20"  width="16" height="220" fill="url(#b-sage)"/>
    <g transform="rotate(2 215 145)">
      <rect x="204" y="50"  width="22" height="190" fill="url(#b-red)"/>
      <rect x="208" y="135" width="14" height="2"   fill="#d4c5a8" opacity="0.65"/>
    </g>
    <rect x="226" y="30"  width="18" height="210" fill="url(#b-mustard)"/>
    <rect x="244" y="48"  width="20" height="192" fill="url(#b-cream)"/>
    <rect x="249" y="130" width="10" height="1.5" fill="#8b5a3c" opacity="0.7"/>
    <rect x="264" y="22"  width="14" height="218" fill="url(#b-forest)"/>
    <rect x="278" y="42"  width="22" height="198" fill="url(#b-black)"/>
    <rect x="284" y="125" width="10" height="2"   fill="#d4a437" opacity="0.7"/>
    <rect x="300" y="30"  width="14" height="210" fill="url(#b-burgundy)"/>
    <!-- vase decorative -->
    <ellipse cx="195" cy="232" rx="14" ry="4" fill="#000" opacity="0.4"/>
    <path d="M 184 232 Q 184 218 188 215 Q 196 213 204 215 Q 206 218 206 232 Z" fill="url(#vasePot)"/>
    <rect x="188" y="208" width="14" height="8" fill="#8a7a5c" opacity="0.5"/>

    <!-- Section C -->
    <rect x="326" y="44"  width="20" height="196" fill="url(#b-forest)"/>
    <rect x="330" y="125" width="12" height="2"   fill="#d4a437" opacity="0.55"/>
    <rect x="346" y="22"  width="16" height="218" fill="url(#b-red)"/>
    <rect x="362" y="34"  width="22" height="206" fill="url(#b-navy)"/>
    <rect x="368" y="120" width="10" height="2"   fill="#d4a437" opacity="0.7"/>
    <rect x="368" y="130" width="10" height="1"   fill="#d4a437" opacity="0.5"/>
    <rect x="384" y="50"  width="18" height="190" fill="url(#b-beige)"/>
    <!-- plant -->
    <g transform="translate(420, 240)">
      <ellipse cx="0" cy="0" rx="14" ry="3" fill="#000" opacity="0.35"/>
      <rect x="-12" y="-22" width="24" height="22" fill="url(#terracotta)" rx="2"/>
      <ellipse cx="-4" cy="-30" rx="9" ry="14" fill="url(#leafA)" transform="rotate(-15 -4 -30)"/>
      <ellipse cx="6" cy="-32" rx="8" ry="13" fill="url(#leafB)" transform="rotate(20 6 -32)"/>
      <ellipse cx="-8" cy="-44" rx="7" ry="11" fill="url(#leafA)"/>
      <ellipse cx="2" cy="-48" rx="9" ry="14" fill="url(#leafB)" transform="rotate(10 2 -48)"/>
    </g>
    <rect x="446" y="40"  width="14" height="200" fill="url(#b-cream)"/>
    <rect x="460" y="56"  width="14" height="184" fill="url(#b-black)"/>
    <rect x="464" y="140" width="6"  height="1.5" fill="#d4a437" opacity="0.6"/>
  </g>

  <!-- ============ Shelf 1 ============ -->
  <rect y="240" width="480" height="8" fill="url(#shelfGlass)"/>
  <rect y="240" width="480" height="1.5" fill="#ffffff" opacity="0.95"/>
  <rect y="248" width="480" height="3" fill="#000" opacity="0.30"/>
  <rect y="251" width="480" height="20" fill="url(#shelfDropShadow)"/>

  <!-- ============ ROW 2 — middle shelf ============ -->
  <g>
    <!-- Section A -->
    <rect x="10"  y="266" width="22" height="200" fill="url(#b-navy)"/>
    <rect x="14"  y="350" width="14" height="2"   fill="#d4a437" opacity="0.7"/>
    <rect x="32"  y="280" width="16" height="186" fill="url(#b-mustard)"/>
    <!-- horizontal stack on the left -->
    <rect x="52"  y="430" width="72" height="14" fill="url(#b-sage)"/>
    <rect x="52"  y="416" width="58" height="14" fill="url(#b-red)"/>
    <rect x="52"  y="402" width="68" height="14" fill="url(#b-cream)"/>
    <!-- upright books to the right of stack -->
    <rect x="60"  y="276" width="20" height="124" fill="url(#b-forest)"/>
    <rect x="80"  y="262" width="14" height="138" fill="url(#b-burgundy)"/>
    <rect x="94"  y="284" width="22" height="116" fill="url(#b-black)"/>
    <rect x="98"  y="335" width="14" height="2"   fill="#d4a437" opacity="0.7"/>
    <rect x="116" y="270" width="18" height="130" fill="url(#b-teal)"/>
    <rect x="134" y="280" width="20" height="120" fill="url(#b-beige)"/>

    <!-- Section B -->
    <rect x="168" y="276" width="18" height="190" fill="url(#b-red)"/>
    <rect x="172" y="360" width="10" height="2"   fill="#d4c5a8" opacity="0.6"/>
    <rect x="186" y="260" width="20" height="206" fill="url(#b-navy)"/>
    <rect x="191" y="360" width="10" height="2"   fill="#d4a437" opacity="0.7"/>
    <rect x="206" y="288" width="14" height="178" fill="url(#b-forest)"/>
    <g transform="rotate(-1.5 231 365)">
      <rect x="220" y="264" width="22" height="202" fill="url(#b-cream)"/>
      <rect x="225" y="365" width="12" height="1.5" fill="#8b5a3c" opacity="0.7"/>
    </g>
    <rect x="242" y="280" width="16" height="186" fill="url(#b-mustard)"/>
    <rect x="258" y="270" width="20" height="196" fill="url(#b-black)"/>
    <rect x="262" y="358" width="12" height="2"   fill="#d4a437" opacity="0.7"/>
    <rect x="278" y="284" width="18" height="182" fill="url(#b-burgundy)"/>
    <rect x="296" y="262" width="18" height="204" fill="url(#b-teal)"/>

    <!-- Section C -->
    <rect x="326" y="290" width="20" height="176" fill="url(#b-sage)"/>
    <rect x="346" y="266" width="14" height="200" fill="url(#b-cream)"/>
    <!-- horizontal stack -->
    <rect x="362" y="438" width="68" height="14" fill="url(#b-mustard)"/>
    <rect x="362" y="424" width="78" height="14" fill="url(#b-navy)"/>
    <rect x="362" y="410" width="64" height="14" fill="url(#b-brown)"/>
    <!-- upright next to it -->
    <rect x="370" y="266" width="22" height="142" fill="url(#b-red)"/>
    <rect x="375" y="360" width="12" height="2"   fill="#d4c5a8" opacity="0.6"/>
    <rect x="392" y="280" width="14" height="128" fill="url(#b-forest)"/>
    <rect x="406" y="262" width="22" height="146" fill="url(#b-black)"/>
    <rect x="411" y="358" width="12" height="2"   fill="#d4a437" opacity="0.7"/>
    <rect x="411" y="368" width="12" height="1"   fill="#d4a437" opacity="0.5"/>
    <rect x="446" y="274" width="14" height="192" fill="url(#b-burgundy)"/>
    <rect x="460" y="284" width="14" height="182" fill="url(#b-beige)"/>
  </g>

  <!-- ============ Shelf 2 ============ -->
  <rect y="466" width="480" height="8" fill="url(#shelfGlass)"/>
  <rect y="466" width="480" height="1.5" fill="#ffffff" opacity="0.95"/>
  <rect y="474" width="480" height="3" fill="#000" opacity="0.30"/>
  <rect y="477" width="480" height="20" fill="url(#shelfDropShadow)"/>

  <!-- ============ ROW 3 — bottom shelf ============ -->
  <g>
    <!-- Section A -->
    <rect x="10"  y="498" width="20" height="194" fill="url(#b-forest)"/>
    <rect x="14"  y="590" width="12" height="2"   fill="#d4a437" opacity="0.7"/>
    <rect x="30"  y="510" width="16" height="182" fill="url(#b-beige)"/>
    <rect x="46"  y="490" width="22" height="202" fill="url(#b-red)"/>
    <rect x="51"  y="585" width="12" height="2"   fill="#d4c5a8" opacity="0.7"/>
    <rect x="68"  y="514" width="18" height="178" fill="url(#b-cream)"/>
    <rect x="86"  y="500" width="20" height="192" fill="url(#b-black)"/>
    <rect x="90"  y="585" width="12" height="2"   fill="#d4a437" opacity="0.75"/>
    <rect x="106" y="522" width="14" height="170" fill="url(#b-navy)"/>
    <rect x="120" y="506" width="22" height="186" fill="url(#b-mustard)"/>
    <rect x="142" y="494" width="14" height="198" fill="url(#b-burgundy)"/>

    <!-- Section B -->
    <rect x="168" y="510" width="14" height="182" fill="url(#b-teal)"/>
    <rect x="182" y="494" width="22" height="198" fill="url(#b-sage)"/>
    <rect x="187" y="585" width="12" height="2"   fill="#d4a437" opacity="0.6"/>
    <!-- ceramic coin bank -->
    <g transform="translate(220, 692)">
      <ellipse cx="14" cy="0" rx="22" ry="4" fill="#000" opacity="0.35"/>
      <path d="M -4 0 Q -4 -28 4 -36 Q 14 -42 24 -36 Q 32 -28 32 0 Z" fill="url(#vasePot)"/>
      <path d="M -4 0 Q -4 -10 -2 -16 L 0 -16 Q -1 -8 -1 0 Z" fill="#000" opacity="0.12"/>
      <rect x="9" y="-39" width="10" height="2" rx="1" fill="#8a7a5c"/>
      <ellipse cx="14" cy="-36" rx="14" ry="2.5" fill="#000" opacity="0.14"/>
    </g>
    <!-- coin stack -->
    <g transform="translate(254, 690)">
      <ellipse cx="0" cy="0"  rx="6" ry="2"   fill="#a08240" opacity="0.9"/>
      <ellipse cx="0" cy="-4" rx="6" ry="2"   fill="#b8923c"/>
      <ellipse cx="0" cy="-8" rx="6" ry="2"   fill="#c89c40"/>
      <ellipse cx="0" cy="-12" rx="6" ry="2"  fill="#b8923c"/>
    </g>
    <rect x="268" y="510" width="14" height="182" fill="url(#b-red)"/>
    <rect x="282" y="490" width="22" height="202" fill="url(#b-forest)"/>
    <rect x="287" y="590" width="12" height="2"   fill="#d4a437" opacity="0.7"/>
    <rect x="304" y="520" width="10" height="172" fill="url(#b-mustard)"/>

    <!-- Section C -->
    <rect x="326" y="494" width="18" height="198" fill="url(#b-navy)"/>
    <rect x="330" y="588" width="10" height="2"   fill="#d4a437" opacity="0.7"/>
    <rect x="344" y="514" width="22" height="178" fill="url(#b-cream)"/>
    <rect x="366" y="498" width="14" height="194" fill="url(#b-burgundy)"/>
    <rect x="380" y="520" width="20" height="172" fill="url(#b-black)"/>
    <rect x="384" y="595" width="12" height="2"   fill="#d4a437" opacity="0.7"/>
    <!-- plant 2 -->
    <g transform="translate(424, 692)">
      <ellipse cx="0" cy="0" rx="16" ry="3" fill="#000" opacity="0.35"/>
      <rect x="-14" y="-18" width="28" height="18" fill="url(#terracotta)" rx="2"/>
      <ellipse cx="-6" cy="-28" rx="8" ry="12" fill="url(#leafA)" transform="rotate(-18 -6 -28)"/>
      <ellipse cx="6" cy="-26" rx="7" ry="11" fill="url(#leafB)" transform="rotate(22 6 -26)"/>
      <ellipse cx="0" cy="-40" rx="9" ry="13" fill="url(#leafA)"/>
      <ellipse cx="-10" cy="-38" rx="6" ry="10" fill="url(#leafB)" transform="rotate(-5 -10 -38)"/>
      <ellipse cx="10" cy="-42" rx="7" ry="12" fill="url(#leafA)" transform="rotate(12 10 -42)"/>
    </g>
    <rect x="450" y="508" width="14" height="184" fill="url(#b-beige)"/>
    <rect x="464" y="494" width="14" height="198" fill="url(#b-red)"/>
  </g>

  <!-- subtle whole-image curvature shading overlay so the wall reads
       as a real surface lit primarily from above-center -->
  <rect width="480" height="720" fill="url(#spineL)" opacity="0.10"/>
</svg>
