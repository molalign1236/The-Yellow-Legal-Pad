<?xml version="1.0" encoding="UTF-8"?>
<!--
  Library backdrop — hand-rolled SVG of book spines on shelves, used
  as a tiled body background-image. Tiles 240px wide × 600px tall.
  Books have varied widths, heights, and muted leather/cloth tones
  so the pattern doesn't read as obviously repeating at typical
  viewport sizes. Shelf lines and bottom shadows give vertical
  rhythm so the books read as rows on shelves, not a flat stripe.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="240" height="600" viewBox="0 0 240 600">
  <!-- back wall (dark mahogany) -->
  <rect width="240" height="600" fill="#1a0e08"/>

  <!-- Row 1 (top) -->
  <g>
    <rect x="0" y="8" width="22" height="186" fill="#4a2818"/>
    <rect x="22" y="22" width="18" height="172" fill="#6a3a28"/>
    <rect x="40" y="2" width="26" height="192" fill="#3a201a"/>
    <rect x="66" y="30" width="20" height="164" fill="#4a2820"/>
    <rect x="86" y="14" width="28" height="180" fill="#2a4838"/>
    <rect x="114" y="24" width="22" height="170" fill="#7a3a28"/>
    <rect x="136" y="0" width="30" height="194" fill="#3a2818"/>
    <rect x="166" y="20" width="20" height="174" fill="#5a3525"/>
    <rect x="186" y="10" width="26" height="184" fill="#4a3025"/>
    <rect x="212" y="26" width="28" height="168" fill="#3a4845"/>
    <!-- gold accents on a few spines -->
    <rect x="48" y="40" width="10" height="2" fill="#8a6b25" opacity="0.55"/>
    <rect x="48" y="50" width="10" height="1" fill="#8a6b25" opacity="0.4"/>
    <rect x="140" y="35" width="14" height="2" fill="#8a6b25" opacity="0.55"/>
    <rect x="140" y="45" width="14" height="1" fill="#8a6b25" opacity="0.4"/>
    <rect x="190" y="45" width="10" height="2" fill="#8a6b25" opacity="0.55"/>
  </g>

  <!-- Shelf 1 -->
  <rect y="194" width="240" height="10" fill="#120a06"/>
  <rect y="200" width="240" height="2" fill="#000000" opacity="0.6"/>
  <rect y="194" width="240" height="1" fill="#3a2a1a" opacity="0.4"/>

  <!-- Row 2 (middle) -->
  <g>
    <rect x="0" y="208" width="26" height="186" fill="#6a3828"/>
    <rect x="26" y="220" width="20" height="174" fill="#3a4838"/>
    <rect x="46" y="204" width="30" height="190" fill="#5a3020"/>
    <rect x="76" y="218" width="22" height="176" fill="#4a3018"/>
    <rect x="98" y="212" width="24" height="182" fill="#7a4030"/>
    <rect x="122" y="226" width="18" height="168" fill="#3a2020"/>
    <rect x="140" y="208" width="30" height="186" fill="#5a3525"/>
    <rect x="170" y="224" width="22" height="170" fill="#8a4a30"/>
    <rect x="192" y="214" width="24" height="180" fill="#4a2820"/>
    <rect x="216" y="206" width="24" height="188" fill="#3a3848"/>
    <!-- gold accents -->
    <rect x="56" y="240" width="14" height="2" fill="#8a6b25" opacity="0.55"/>
    <rect x="56" y="252" width="14" height="1" fill="#8a6b25" opacity="0.4"/>
    <rect x="106" y="250" width="10" height="2" fill="#8a6b25" opacity="0.55"/>
    <rect x="196" y="245" width="14" height="2" fill="#8a6b25" opacity="0.55"/>
    <rect x="196" y="255" width="14" height="1" fill="#8a6b25" opacity="0.4"/>
  </g>

  <!-- Shelf 2 -->
  <rect y="394" width="240" height="10" fill="#120a06"/>
  <rect y="400" width="240" height="2" fill="#000000" opacity="0.6"/>
  <rect y="394" width="240" height="1" fill="#3a2a1a" opacity="0.4"/>

  <!-- Row 3 (bottom) -->
  <g>
    <rect x="0" y="410" width="24" height="184" fill="#4a3018"/>
    <rect x="24" y="408" width="28" height="186" fill="#6a3525"/>
    <rect x="52" y="416" width="22" height="178" fill="#3a3838"/>
    <rect x="74" y="406" width="30" height="188" fill="#5a3525"/>
    <rect x="104" y="412" width="20" height="182" fill="#7a4028"/>
    <rect x="124" y="410" width="26" height="184" fill="#4a2820"/>
    <rect x="150" y="418" width="22" height="176" fill="#3a4838"/>
    <rect x="172" y="408" width="28" height="186" fill="#5a3020"/>
    <rect x="200" y="414" width="20" height="180" fill="#6a3a28"/>
    <rect x="220" y="410" width="20" height="184" fill="#4a3528"/>
    <!-- gold accents -->
    <rect x="32" y="445" width="14" height="2" fill="#8a6b25" opacity="0.55"/>
    <rect x="80" y="450" width="16" height="2" fill="#8a6b25" opacity="0.5"/>
    <rect x="80" y="460" width="16" height="1" fill="#8a6b25" opacity="0.4"/>
    <rect x="180" y="445" width="14" height="2" fill="#8a6b25" opacity="0.55"/>
  </g>

  <!-- subtle vertical light gradients on every book to give curve -->
  <defs>
    <linearGradient id="spine-shade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="black" stop-opacity="0.35"/>
      <stop offset="0.4" stop-color="black" stop-opacity="0"/>
      <stop offset="0.6" stop-color="black" stop-opacity="0"/>
      <stop offset="1" stop-color="black" stop-opacity="0.35"/>
    </linearGradient>
  </defs>
  <rect width="240" height="600" fill="url(#spine-shade)" opacity="0.18"/>
</svg>
