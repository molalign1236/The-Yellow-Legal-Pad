<?xml version="1.0" encoding="UTF-8"?>
<!--
  Yellow Legal Pad — favicon.
  An honest miniature: ivory paper, a left margin rule, and three
  horizontal lines, in the site's restrained gold. Reads as a tiny
  pad of paper at tab size. Not a logo, not a mark — a small
  picture of the thing the site is named after.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <rect width="32" height="32" fill="#f6f1e6" />
  <line x1="9" y1="4" x2="9" y2="28" stroke="#a87f2b" stroke-width="1" opacity="0.6" stroke-linecap="round" />
  <line x1="4" y1="12" x2="28" y2="12" stroke="#a87f2b" stroke-width="1" opacity="0.5" stroke-linecap="round" />
  <line x1="4" y1="18" x2="28" y2="18" stroke="#a87f2b" stroke-width="1" opacity="0.5" stroke-linecap="round" />
  <line x1="4" y1="24" x2="28" y2="24" stroke="#a87f2b" stroke-width="1" opacity="0.5" stroke-linecap="round" />
</svg>
